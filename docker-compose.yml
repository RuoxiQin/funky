# docker-compose.yml (repo root) — the quickstart stack: postgres + migrate + api.
# Bring up:   docker compose up --build
# Tear down:  docker compose down          (-v to also wipe the database)

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: funky
      POSTGRES_PASSWORD: funky
      POSTGRES_DB: funky
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432" # host access for psql/drizzle studio; stop any standalone funky-pg first
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U funky -d funky"]
      interval: 2s
      timeout: 2s
      retries: 15

  # One-shot: applies migrations, exits. The api waits for it to succeed —
  # this is "migrate on boot" done compose-natively.
  migrate:
    build: .
    command: ["pnpm", "-F", "@funky/db", "migrate"]
    environment:
      DATABASE_URL: postgres://funky:funky@postgres:5432/funky # ← service name, not localhost
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://funky:funky@postgres:5432/funky
      FUNKY_AUTH_TOKEN: ${FUNKY_AUTH_TOKEN:-dev-token-change-me-000} # reads host .env if present
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
